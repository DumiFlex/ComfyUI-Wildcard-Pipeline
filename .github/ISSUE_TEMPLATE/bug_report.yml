name: "Bug Report"
description: "Report a bug with a Wildcard Pipeline node or the Manager SPA"
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Please fill out as much as possible to help us reproduce the issue."
  - type: dropdown
    id: node
    attributes:
      label: "Which component is affected?"
      options:
        - WildcardPipeline
        - PromptAssembler
        - ContextInject
        - Manager SPA (/wp/)
        - Other
    validations:
      required: true
  - type: input
    id: comfyui_version
    attributes:
      label: "ComfyUI Version"
      placeholder: "e.g. v0.3.10 (check startup logs)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: "Python Version"
      placeholder: "e.g. 3.11.5"
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: "Error Traceback"
      description: "Paste the full error traceback if available"
      render: shell
    validations:
      required: false
  - type: textarea
    id: workflow_json
    attributes:
      label: "Workflow JSON"
      description: "Export your workflow as JSON and paste it here, or link to a gist"
      render: json
    validations:
      required: false
