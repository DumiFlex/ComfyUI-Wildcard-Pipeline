name: "Feature Request"
description: "Suggest a new feature or improvement"
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting an improvement!"
  - type: dropdown
    id: area
    attributes:
      label: "Which area does this relate to?"
      options:
        - Pipeline Engine
        - Nodes
        - Manager SPA (/wp/)
        - API
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve?"
      description: "Describe the problem or limitation you're experiencing"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "How would you like this to work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any other solutions or workarounds you've tried?"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Screenshots, mockups, related discussions, etc."
    validations:
      required: false
