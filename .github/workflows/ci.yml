name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt every JS-based action into the Node 24 runner. Removes deprecation
# warnings for actions still packaged against Node 20 (e.g. pnpm/action-setup@v4).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" pytest-cov
      - run: ruff check .
      - run: pytest --ignore=tests/syntax/test_fuzz.py --ignore=tests/syntax/test_perf.py

      - name: Python syntax tests with coverage
        run: >
          pytest tests/syntax/
          --ignore=tests/syntax/test_fuzz.py
          --ignore=tests/syntax/test_perf.py
          -v --cov=engine/syntax --cov-fail-under=80

      - name: Determinism + parity gate
        run: pytest tests/syntax/test_determinism.py -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:coverage
      - name: TS syntax tests (parity + snapshot)
        run: pnpm vitest run src/manager/__tests__/syntax/
      - run: pnpm build:extension
      - run: pnpm size
      - run: pnpm build:manager
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # Perf regression — single-CPU pin for variance reduction
  perf:
    name: Perf gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Perf regression (single-CPU pin)
        run: |
          if command -v taskset >/dev/null 2>&1; then
            taskset -c 0 pytest tests/syntax/test_perf.py -m perf -v --strict-markers
          else
            pytest tests/syntax/test_perf.py -m perf -v --strict-markers
          fi

  # Fuzz — opt-in, non-blocking (failures are advisory)
  fuzz:
    name: Fuzz (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Python fuzz
        run: pytest tests/syntax/test_fuzz.py -m fuzz -v --strict-markers
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TS fuzz
        run: pnpm vitest run src/manager/__tests__/syntax/fuzz.test.ts
