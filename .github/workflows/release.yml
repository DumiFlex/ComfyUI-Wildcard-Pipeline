name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

# Opt every JS-based action into the Node 24 runner. Removes deprecation
# warnings for actions still packaged against Node 20 (e.g. pnpm/action-setup@v4).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm size
      - env:
          # Uses a user-provided PAT stored as the repo secret `GH_TOKEN`.
          # Required because the auto-provided `GITHUB_TOKEN` can't push
          # release commits/tags that trigger downstream workflows, and
          # GitHub reserves the `GITHUB_` prefix for built-in tokens —
          # user secrets can't be named `GITHUB_TOKEN`.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm exec semantic-release
